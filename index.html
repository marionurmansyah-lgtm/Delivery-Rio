<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - PT Klase Auto Rental</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<!-- ✅ SUPABASE CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
.hide { display: none !important; }
.fade-in { animation: fadeIn 0.3s ease-in-out; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body class="bg-gradient-to-br from-blue-50 via-white to-blue-50 min-h-screen flex items-center justify-center p-4">

<div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100 fade-in">
  <div class="text-center mb-8">
    <!-- ✅ LOGO CONTAINER -->
    <div class="w-24 h-24 bg-white rounded-2xl flex items-center justify-center mx-auto mb-4 overflow-hidden shadow-inner border border-gray-100">
      <img id="logoAuth" src="" alt="Logo PT Klase" class="w-full h-full object-contain p-2">
    </div>
    <h1 class="text-2xl font-bold text-blue-900">PT Klase Auto Rental</h1>
    <p class="text-gray-500 text-sm mt-1">Delivery Partner App</p>
  </div>

  <!-- Login Form -->
  <div id="loginForm">
    <h2 class="text-xl font-semibold mb-6 text-gray-700">Masuk ke Akun</h2>
    <div class="space-y-4">
      <div>
        <label class="block text-xs font-medium text-gray-500 mb-1 uppercase">Email</label>
        <input type="email" id="loginEmail" placeholder="nama@email.com" class="w-full px-4 py-3.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-500 mb-1 uppercase">Password</label>
        <input type="password" id="loginPass" placeholder="••••••••" class="w-full px-4 py-3.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50">
      </div>
    </div>
    <button onclick="handleLogin()" id="btnLogin" class="w-full mt-8 bg-blue-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-700 transition">Masuk</button>
    <div class="mt-6 text-center">
      <p class="text-sm text-gray-500">Belum punya akun? <a href="#" onclick="toggleAuth('register')" class="text-blue-600 font-semibold">Daftar disini</a></p>
    </div>
  </div>

  <!-- Register Form -->
  <div id="registerForm" class="hide">
    <h2 class="text-xl font-semibold mb-6 text-gray-700">Daftar Kurir Baru</h2>
    <div class="space-y-3">
      <input type="text" id="regName" placeholder="Nama Lengkap" class="w-full px-4 py-3.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50">
      <input type="email" id="regEmail" placeholder="Email" class="w-full px-4 py-3.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50">
      <input type="tel" id="regPhone" placeholder="Nomor HP" class="w-full px-4 py-3.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50">
      <input type="password" id="regPass" placeholder="Password (min 6 karakter)" class="w-full px-4 py-3.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50">
    </div>
    <button onclick="handleRegister()" id="btnRegister" class="w-full mt-6 bg-green-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-green-700 transition">Daftar Sekarang</button>
    <div class="mt-6 text-center">
      <p class="text-sm text-gray-500">Sudah punya akun? <a href="#" onclick="toggleAuth('login')" class="text-blue-600 font-semibold">Login</a></p>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// ⚙️ CONFIG - PATTERN RW APP (MENGGUNAKAN _supabase) ✅
// ═══════════════════════════════════════════════════════════════
const SB_URL = 'https://pyaqgicjxfgckzgxsvzz.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB5YXFnaWNqeGZnY2t6Z3hzdnp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NjEwNjcsImV4cCI6MjA4ODEzNzA2N30.YnOXsN8UAFV9EQikIhTujDPiWjtxiba3co257LFs9w0';
const LOGO_URL = 'https://pyaqgicjxfgckzgxsvzz.supabase.co/storage/v1/object/public/DELIVERY_PHOTOS/kar.png';

// ✅ PENTING: Gunakan _supabase (dengan underscore) untuk menghindari konflik
const _supabase = supabase.createClient(SB_URL, SB_KEY);

let currentUser = null;

// ═══════════════════════════════════════════════════════════════
// 🔔 NOTIFY FUNCTION - LIKE RW APP ✅
// ═══════════════════════════════════════════════════════════════
function notify(msg, icon = 'info') {
  Swal.fire({ icon, title: msg, timer: 2000, showConfirmButton: false });
}

// ═══════════════════════════════════════════════════════════════
// 🔄 TOGGLE AUTH VIEW
// ═══════════════════════════════════════════════════════════════
function toggleAuth(view) {
  document.getElementById('loginForm').classList.toggle('hide', view !== 'login');
  document.getElementById('registerForm').classList.toggle('hide', view !== 'register');
}

// ═══════════════════════════════════════════════════════════════
// 🔐 LOGIN - SIMPLE & DIRECT ✅
// ═══════════════════════════════════════════════════════════════
async function handleLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPass').value;
  const btn = document.getElementById('btnLogin');

  if (!email || !password) { notify('Email dan password wajib diisi!', 'warning'); return; }

  btn.disabled = true;
  btn.innerHTML = '<div class="loading-spinner"></div> Memproses...';

  try {
    const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
    if (error) throw error;

    const { data: profile } = await _supabase.from('profiles').select('role, full_name').eq('id', data.user.id).single();
    
    currentUser = {
      id: data.user.id,
      email,
      name: profile?.full_name || email.split('@')[0],
      role: profile?.role || 'Kurir'
    };

    localStorage.setItem('currentUser', JSON.stringify(currentUser));
    
    if (currentUser.role === 'Admin') {
      window.location.href = 'admin.html';
    } else {
      window.location.href = 'dashboard.html';
    }
  } catch (error) {
    notify(error.message, 'error');
    btn.disabled = false;
    btn.innerHTML = 'Masuk';
  }
}

// ═══════════════════════════════════════════════════════════════
// 📝 REGISTER - SIMPLE & DIRECT ✅
// ═══════════════════════════════════════════════════════════════
async function handleRegister() {
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const phone = document.getElementById('regPhone').value.trim();
  const password = document.getElementById('regPass').value;
  const btn = document.getElementById('btnRegister');

  if (!name || !email || !password) { notify('Nama, Email, dan Password wajib diisi!', 'warning'); return; }
  if (password.length < 6) { notify('Password minimal 6 karakter!', 'warning'); return; }

  btn.disabled = true;
  btn.innerHTML = '<div class="loading-spinner"></div> Mendaftar...';

  try {
    const { data, error } = await _supabase.auth.signUp({
      email,
      password,
      options: { data: { full_name: name, phone, role: 'Kurir' } }
    });
    if (error) throw error;

    notify('Pendaftaran berhasil! Silakan login.', 'success');
    setTimeout(() => toggleAuth('login'), 1500);
  } catch (error) {
    notify(error.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Daftar Sekarang';
  }
}

// ═══════════════════════════════════════════════════════════════
// 🔄 CHECK SESSION ON LOAD - SIMPLE ✅
// ═══════════════════════════════════════════════════════════════
async function checkSession() {
  const saved = localStorage.getItem('currentUser');
  if (saved) {
    currentUser = JSON.parse(saved);
    const { data } = await _supabase.auth.getSession();
    if (data?.session) {
      window.location.href = currentUser.role === 'Admin' ? 'admin.html' : 'dashboard.html';
    } else {
      localStorage.removeItem('currentUser');
    }
  }
}

// ═══════════════════════════════════════════════════════════════
// 🚀 INIT - SIMPLE LIKE RW APP ✅
// ═══════════════════════════════════════════════════════════════
window.onload = () => {
  // ✅ Setup logo dengan error handling
  const logoImg = document.getElementById('logoAuth');
  if (logoImg) {
    logoImg.src = LOGO_URL;
    logoImg.onerror = function() {
      console.warn('⚠️ Logo gagal dimuat, menggunakan fallback');
      this.parentElement.innerHTML = '<i class="fas fa-truck-moving text-4xl text-blue-600"></i>';
    };
    // Fallback timeout 3 detik
    setTimeout(function() {
      if (!logoImg.complete || logoImg.naturalHeight === 0) {
        if (logoImg.parentElement) {
          logoImg.parentElement.innerHTML = '<i class="fas fa-truck-moving text-4xl text-blue-600"></i>';
        }
      }
    }, 3000);
  }
  
  checkSession();
  console.log('✅ App ready - Pattern RW App!');
  console.log('📡 Supabase URL:', SB_URL);
};
</script>
</body>
</html>
